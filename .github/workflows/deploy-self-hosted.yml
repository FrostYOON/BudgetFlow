name: Deploy Self Hosted

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SELF_HOSTED_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SELF_HOSTED_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with docker compose on server
        run: |
          ssh "${{ secrets.SELF_HOSTED_DEPLOY_USER }}@${{ secrets.SELF_HOSTED_DEPLOY_HOST }}" << 'EOF'
          set -e
          cd "${{ secrets.SELF_HOSTED_DEPLOY_PATH }}"
          git fetch origin
          git checkout main
          git pull --ff-only origin main
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
          EOF
